<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Touch Typing Adventure</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#87d8ff,#a38bff);margin:0;padding:20px}
.app{max-width:1100px;margin:auto;background:#fff;border-radius:30px;padding:20px}
.header{display:flex;align-items:center;gap:15px;justify-content:center}
.logo{width:80px;height:80px}
.stats,.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.card,button,.panel{background:#eef6ff;border-radius:20px;padding:12px}
button{border:none;cursor:pointer;font-weight:bold}
.text{font-size:2rem;min-height:120px;background:#fafcff;border-radius:20px;padding:20px;line-height:1.8}
.correct{color:#3cb043}.current{color:#ff4d7a;text-decoration:underline}.remaining{color:#999}
#countdown{font-size:3rem;text-align:center;color:red;height:60px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center}
.modalbox{background:white;padding:30px;border-radius:25px;text-align:center}
</style>
</head>
<body>
<div class="app">
<div class="header"><img src="logo.png" class="logo"><h1>Touch Typing Adventure</h1></div>

<div class="controls">
<button id="instructionBtn">Instruction Mode</button>
<button id="exerciseBtn">Exercise Mode</button>
<button id="startBtn">Start</button>
<label class="panel"><input type="checkbox" id="timerToggle" checked> Timer Enabled</label>
</div>

<div class="stats">
<div class="card">Time: <span id="time">60</span></div>
<div class="card">Score: <span id="score">0</span></div>
<div class="card">Level: <span id="level">1</span></div>
<div class="card">Accuracy: <span id="accuracy">100%</span></div>
</div>

<div class="panel"><b id="lessonTitle">Home Keys</b><br><span id="lessonText">Put index fingers on F and J.</span></div>

<div id="text" class="text"></div>
<div id="countdown"></div>

<div class="panel">Type on your keyboard. Spaces are automatic and do NOT require pressing Space.</div>
</div>

<div class="modal" id="gameover">
<div class="modalbox">
<h2>Game Over</h2>
<p>Score: <span id="finalScore"></span></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<audio id="click" src="Mouseclicksound.mp3" preload="auto"></audio>

<script>
const lessons=[
{t:"Home Keys",i:"Put index fingers on F and J.",s:["fjfjfj","jfjfjf"]},
{t:"Home Row",i:"Return fingers to home row.",s:["asdf jkl","sad lad","dad asks"]},
{t:"Words",i:"Type common words.",s:["apple orange banana","school teacher student","happy bright future"]},
{t:"Sentences",i:"Type full sentences.",s:["I enjoy learning English every day.","Practice makes progress.","Small steps create big results."]}
];

const extras=[];
const words=["apple","orange","teacher","student","future","travel","friend","happy","practice","improve","adventure","mountain","river","music","library","computer"];
for(let i=0;i<220;i++){
 extras.push(words[i%words.length]+" "+words[(i+3)%words.length]+" "+words[(i+7)%words.length]);
}

let lesson=0,item=0,pos=0,score=0,total=0,mistakes=0,time=60,timer=null;
let mode="instruction";

const click=document.getElementById("click");
const pool=[];
for(let i=0;i<8;i++){ pool.push(new Audio("Mouseclicksound.mp3")); }

function playClick(){
 const a=pool.find(x=>x.paused)||pool[0];
 a.currentTime=0;
 a.play().catch(()=>{});
}

function currentText(){
 if(lesson<lessons.length) return lessons[lesson].s[item];
 return extras[(item)%extras.length];
}

function render(){
 const txt=currentText();
 const box=document.getElementById("text");
 box.innerHTML="";
 for(let i=0;i<txt.length;i++){
  const s=document.createElement("span");
  s.textContent=txt[i];
  s.className=i<pos?"correct":i===pos?"current":"remaining";
  box.appendChild(s);
 }
 document.getElementById("lessonTitle").textContent=lesson<lessons.length?lessons[lesson].t:"Free Practice";
 document.getElementById("lessonText").textContent=lesson<lessons.length?lessons[lesson].i:"Keep going!";
}

function nextItem(){
 pos=0; item++;
 if(lesson<lessons.length && item>=lessons[lesson].s.length){ lesson++; item=0; }
 document.getElementById("level").textContent=Math.min(lesson+1, lessons.length+1);
 render();
}

function updateAcc(){
 const acc=total?Math.round(((total-mistakes)/total)*100):100;
 document.getElementById("accuracy").textContent=acc+"%";
}

document.addEventListener("keydown",e=>{
 const txt=currentText();
 if(!txt) return;

 let expected=txt[pos];

 if(expected===" "){
   pos++;
   render();
   expected=txt[pos];
 }

 if(e.key.length!==1) return;

 total++;

 if(e.key===expected){
   playClick();
   pos++;
   if(txt[pos]===" "){ pos++; } // auto-skip spaces
   render();

   if(pos>=txt.length){
      score+=10;
      document.getElementById("score").textContent=score;
      nextItem();
   }
 }else{
   mistakes++;
 }
 updateAcc();
 e.preventDefault();
});

function startGame(){
 clearInterval(timer);
 if(!document.getElementById("timerToggle").checked || mode==="instruction"){
   document.getElementById("time").textContent="∞";
   render();
   return;
 }

 time=60;
 timer=setInterval(()=>{
   time--;
   document.getElementById("time").textContent=time;

   if(time<=5 && time>0){
      document.getElementById("countdown").textContent=time;
   }

   if(time<=0){
      clearInterval(timer);
      document.getElementById("finalScore").textContent=score;
      document.getElementById("gameover").style.display="flex";
   }
 },1000);

 render();
}

document.getElementById("instructionBtn").onclick=()=>mode="instruction";
document.getElementById("exerciseBtn").onclick=()=>mode="exercise";
document.getElementById("startBtn").onclick=startGame;

render();
</script>
</body>
</html>
